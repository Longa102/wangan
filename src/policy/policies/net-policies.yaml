# 网络操作安全策略
# 负责人：B
# 覆盖工具：net.fetch, net.request, net.websocket 等

policies:
  # ---- 会话敏感数据外发阻断 ----
  - id: net-fetch-data-exfil
    tool: net.fetch
    rule: request_body contains (session_sensitive_data OR read_file_content OR local_secrets)
    action: BLOCK
    risk: CRITICAL
    message: "阻断：检测到尝试将本地敏感数据外发至外部服务器"

  # ---- 非信任域名告警 ----
  - id: net-fetch-untrusted-domain
    tool: net.fetch
    rule: target_url not_in trusted_domains_list
    action: ASK_USER
    risk: HIGH
    message: "告警：目标域名不在信任列表中，请确认"

  # ---- 内网地址外发阻断 ----
  - id: net-fetch-internal-ip
    tool: net.fetch
    rule: request_body contains (internal_ip_addresses OR localhost_resources)
    action: BLOCK
    risk: CRITICAL
    message: "阻断：检测到尝试将内网信息发送至外部"

  # ---- 异常端口连接阻断 ----
  - id: net-fetch-suspicious-port
    tool: net.fetch
    rule: target_url matches ("*:22*", "*:3389*", "*:6379*", "*:27017*")
    action: ASK_USER
    risk: HIGH
    message: "告警：目标端口为常见敏感服务端口"

  # ---- 大文件上传告警 ----
  - id: net-fetch-large-payload
    tool: net.fetch
    rule: request_body_size > 10KB AND target_url not_in trusted_domains_list
    action: ASK_USER
    risk: MEDIUM
    message: "告警：向非信任域名发送大量数据"
