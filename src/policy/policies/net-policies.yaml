# 网络操作安全策略
# 负责人：B
# 覆盖工具：net.fetch, net.request, net.websocket 等

policies:
  # ---- 已读取敏感数据的跨工具外发阻断 ----
  # session_sensitive_data 由代理按“读取来源 → 本次请求体实际引用”建立，
  # 不依赖请求体中必须出现某一种固定密钥格式。
  - id: net-fetch-session-sensitive-dataflow
    tool: net.fetch
    rule: session_sensitive_data contains ("credential") OR session_sensitive_data contains ("sensitive-file")
    action: BLOCK
    risk: CRITICAL
    message: "阻断：当前网络请求携带会话内从敏感来源读取的数据"

  # ---- 会话敏感数据外发阻断 ----
  - id: net-fetch-data-exfil
    tool: net.fetch
    rule: request_body contains ("PRIVATE KEY") OR request_body contains ("BEGIN RSA") OR request_body contains ("sk-") OR request_body contains ("ghp_")
    action: BLOCK
    risk: CRITICAL
    message: "阻断：检测到尝试将本地敏感数据外发至外部服务器"

  # ---- 非信任域名告警 ----
  - id: net-fetch-untrusted-domain
    tool: net.fetch
    rule: target_url not_in trusted_domains_list
    action: ASK_USER
    risk: HIGH
    message: "告警：目标域名不在信任列表中，请确认"

  # ---- 内网地址外发阻断 ----
  - id: net-fetch-internal-ip
    tool: net.fetch
    rule: request_body regex_match ("10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}") OR request_body regex_match ("192\\.168\\.\\d{1,3}\\.\\d{1,3}") OR request_body regex_match ("172\\.(1[6-9]|2\\d|3[01])\\.\\d{1,3}\\.\\d{1,3}")
    action: BLOCK
    risk: CRITICAL
    message: "阻断：检测到尝试将内网信息发送至外部"

  # ---- 异常端口连接阻断 ----
  - id: net-fetch-suspicious-port
    tool: net.fetch
    rule: target_url regex_match (":[0-9]*22") OR target_url regex_match (":[0-9]*3389") OR target_url regex_match (":[0-9]*6379") OR target_url regex_match (":[0-9]*27017")
    action: ASK_USER
    risk: HIGH
    message: "告警：目标端口为常见敏感服务端口"
